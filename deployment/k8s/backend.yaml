apiVersion: apps/v1
kind: Deployment
metadata:
  name: elvakt-backend
  namespace: elvakt
spec:
  replicas: 1
  selector:
    matchLabels:
      app: elvakt-backend
  template:
    metadata:
      labels:
        app: elvakt-backend
    spec:
      containers:
        - name: backend
          image: elvakt-backend:local
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: elvakt-backend-config
            - secretRef:
                name: elvakt-backend-secret
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 20

---
apiVersion: v1
kind: Service
metadata:
  name: elvakt-backend
  namespace: elvakt
spec:
  type: NodePort
  selector:
    app: elvakt-backend
  ports:
    - port: 8000
      targetPort: 8000
      nodePort: 30080
