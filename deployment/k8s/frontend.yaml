apiVersion: apps/v1
kind: Deployment
metadata:
  name: elvakt-frontend
  namespace: elvakt
spec:
  replicas: 1
  selector:
    matchLabels:
      app: elvakt-frontend
  template:
    metadata:
      labels:
        app: elvakt-frontend
    spec:
      containers:
        - name: frontend
          image: elvakt-frontend:local
          imagePullPolicy: Never
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: elvakt-frontend-config

---
apiVersion: v1
kind: Service
metadata:
  name: elvakt-frontend
  namespace: elvakt
spec:
  type: NodePort
  selector:
    app: elvakt-frontend
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30000
